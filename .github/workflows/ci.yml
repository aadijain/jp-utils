name: ci

on:
  push:
  pull_request:

jobs:
  green:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format --check .
      - name: Type-check
        run: uv run pyright
      # The two suites run separately: a combined invocation collides on the two
      # `tests` packages and errors at collection.
      - name: Test backend
        run: uv run pytest backend/tests
      - name: Test add-on
        run: uv run pytest addon/tests
